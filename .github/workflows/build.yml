name: ProjectFlux CI

on:
  push:
    branches: [ "main", "dev", "feature/**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE
      run: |
        pyinstaller --onefile --noconsole --add-data "flux;flux" --name ProjectFlux main.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: ProjectFlux-Build
        path: dist/ProjectFlux.exe

    - name: Status OK
      run: echo "BUILD SUCCESS"
