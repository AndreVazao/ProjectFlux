name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: pyinstaller main.py --onefile --noconsole --add-data "flux;flux" --name ProjectFlux

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ProjectFlux-EXE
          path: dist/ProjectFlux.exe
